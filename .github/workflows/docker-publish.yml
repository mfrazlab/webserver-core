name: Build and Push to GitHub Packages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      fail-fast: false

      matrix:
        include:
          # PHP 8.2
          - php-version: "8.2"
            arch: amd64
            runner: ubuntu-latest

          - php-version: "8.2"
            arch: arm64
            runner: ubuntu-24.04-arm

          # PHP 8.3
          - php-version: "8.3"
            arch: amd64
            runner: ubuntu-latest

          - php-version: "8.3"
            arch: arm64
            runner: ubuntu-24.04-arm

          # PHP 8.4
          - php-version: "8.4"
            arch: amd64
            runner: ubuntu-latest

          - php-version: "8.4"
            arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push architecture image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true

          platforms: linux/${{ matrix.arch }}

          build-args: |
            PHP_VERSION=${{ matrix.php-version }}

          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:php${{ matrix.php-version }}-${{ matrix.arch }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

  manifest:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        php-version: [ "8.2", "8.3", "8.4" ]

    steps:
      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:php${{ matrix.php-version }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:php${{ matrix.php-version }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:php${{ matrix.php-version }}-arm64

      - name: Tag PHP 8.3 as latest
        if: matrix.php-version == '8.3'
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:php8.3-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:php8.3-arm64
