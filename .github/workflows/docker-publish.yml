name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Aqui você define as versões de PHP que quer gerar
        php_version: ["8.2", "8.3", "8.4", "8.5"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Define as plataformas (bate com a lógica do seu Dockerfile)
          platforms: linux/amd64,linux/arm64
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/webserver-full:php${{ matrix.php_version }}
            ${{ matrix.php_version == '8.3' && format('{0}/webserver-full:latest', secrets.DOCKERHUB_USERNAME) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
