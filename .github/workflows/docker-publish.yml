name: Build and Push to GitHub Packages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        # AVISO: PHP 8.5 provavelmente vai falhar pois ainda não existe no PPA do Sury
        php-version: [ '8.2', '8.3', '8.4' ] 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Se você não for rodar em processadores ARM (como Mac M1/M2/M3), 
          # deixe apenas linux/amd64 para o build levar 2 minutos ao invés de 10.
          platforms: linux/amd64,linux/arm64
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
          # CORREÇÃO: trocado _ por -
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:php${{ matrix.php-version }}
            ${{ matrix.php-version == '8.3' && format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}
          # MÁGICA PARA FICAR RÁPIDO: Cache nativo do GitHub Actions
          cache-from: type=gha
          cache-to: type=gha,mode=max
